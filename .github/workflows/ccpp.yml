name: C/C++ CI

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.os }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - name: timestamp correction
        run:  ./utils/time-correct
      - name: configure
        run: ./configure
      - name: make
        run: make -j1
      - name: make check
        run: make check
  r7rs-tests:
    name: ${{ matrix.os }}-r7rs-tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - name: timestamp correction
        run:  ./utils/time-correct
      - name: configure
        run: ./configure
      - name: make
        run: make -j1
      - name: make check
        run: make check
      - name: make install
        run: sudo make install
      - name: Clone tests
        run: git clone https://github.com/ashinn/chibi-scheme.git --depth=1
      - name: Make tests use (srfi 64)
        run: |
          sed -i 's/(chibi test)/(srfi 64)/' chibi-scheme/tests/r7rs-tests.scm
          sed -i 's/(test /(test-equal /g' chibi-scheme/tests/r7rs-tests.scm
      - name: Comment out tests that error
        run: |
          # (test '(b c) (or (memq 'b '(a b c)) (/ 3 0)))
          sed -i '137 s/^/;/' chibi-scheme/tests/r7rs-tests.scm # Division by zero procudes compiler error
          sed -i '138 s/^/;/' chibi-scheme/tests/r7rs-tests.scm # Division by zero procudes compiler error
          # (test '(a 3 4 5 6 b) `(a ,(+ 1 2) ,@(map abs '(4 -5 6)) b))
          sed -i '346 s/^/;/' chibi-scheme/tests/r7rs-tests.scm # invalid context within quasiquote
          # (test #(10 5 4 16 9 8) `#(10 5 ,(square 2) ,@(map square '(4 3)) 8))
          sed -i '347 s/^/;/' chibi-scheme/tests/r7rs-tests.scm # invalid context within quasiquote
          sed -i '348 s/^/;/' chibi-scheme/tests/r7rs-tests.scm # invalid context within quasiquote
      - name: Run r7rs-tests
        run: stklos chibi-scheme/tests/r7rs-tests.scm
