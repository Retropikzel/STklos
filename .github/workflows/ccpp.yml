name: C/C++ CI

on: [push, pull_request]

jobs:
  build-ubuntu:
    name: build-ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: timestamp correction
        run:  ./utils/time-correct
      - name: configure
        run: ./configure
      - name: make
        run: make -j1
      - name: make check
        run: make check
  build-alpine:
    name: build-alpine
    runs-on: ubuntu-latest
    container:
      image: alpine
    steps:
      - name: Install packages
        run: apk add build-base autoconf automake
      - uses: actions/checkout@v6
      - name: timestamp correction
        run:  ./utils/time-correct
      - name: configure
        run: ./configure
      - name: make
        run: make -j1
      - name: make check
        run: make check
  r7rs-tests:
    name: ${{ matrix.os }}-r7rs-tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - name: timestamp correction
        run:  ./utils/time-correct
      - name: configure
        run: ./configure
      - name: make
        run: make -j1
      - name: make check
        run: make check
      - name: make install
        run: sudo make install
      - name: Clone tests
        run: git clone https://github.com/ashinn/chibi-scheme.git --depth=1
      - name: Make tests use (srfi 64)
        run: |
          sed -i 's/(chibi test)/(srfi 64)/' chibi-scheme/tests/r7rs-tests.scm
          sed -i 's/(test /(test-equal /g' chibi-scheme/tests/r7rs-tests.scm
      - name: Comment out tests that error
        run: |
          sed -i '137 s/^/#;/' chibi-scheme/tests/r7rs-tests.scm
          sed -i '346 s/^/;/' chibi-scheme/tests/r7rs-tests.scm
          sed -i '347 s/^/#;/' chibi-scheme/tests/r7rs-tests.scm
          sed -i '413 s/^/#;/' chibi-scheme/tests/r7rs-tests.scm
          sed -i '463 s/^/#;/' chibi-scheme/tests/r7rs-tests.scm
          sed -i '569 s/^/#;/' chibi-scheme/tests/r7rs-tests.scm
          sed -i '595 s/^/#;/' chibi-scheme/tests/r7rs-tests.scm
          sed -i '633 s/^/#;/' chibi-scheme/tests/r7rs-tests.scm
          sed -i '663 s/^/#;/' chibi-scheme/tests/r7rs-tests.scm
      - name: Run r7rs-tests
        run: stklos chibi-scheme/tests/r7rs-tests.scm
