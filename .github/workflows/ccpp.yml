name: C/C++ CI

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.os }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - name: timestamp correction
        run:  ./utils/time-correct
      - name: configure
        run: ./configure
      - name: make
        run: make -j1
      - name: make check
        run: make check
  macos-build:
    name: ${{ matrix.os }}-build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: brew install autoconf
      - name: timestamp correction
        run:  ./utils/time-correct
      - name: configure
        run: ./configure
      - name: make
        run: make -j1
      - name: make check
        run: make check
  r7rs-tests:
    name: ${{ matrix.os }}-r7rs-tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - name: timestamp correction
        run:  ./utils/time-correct
      - name: configure
        run: ./configure
      - name: make
        run: make CFLAGS="-std=c89" -j1
      - name: make check
        run: make check
      - name: make install
        run: sudo make install
      - name: Clone tests
        run: git clone https://github.com/ashinn/chibi-scheme.git --depth=1
      - name: Make tests use (srfi 64)
        run: |
          sed -i 's/(chibi test)/(srfi 64)/' chibi-scheme/tests/r7rs-tests.scm
          sed -i 's/(test /(test-equal /g' chibi-scheme/tests/r7rs-tests.scm
          sed -i 's/3 0/3 1/g' chibi-scheme/tests/r7rs-tests.scm
      - name: Run r7rs-tests
        run: stklos chibi-scheme/tests/r7rs-tests.scm
